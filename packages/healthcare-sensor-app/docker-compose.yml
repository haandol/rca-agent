services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_service
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/test_service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      FAULT_DB_LEAK: "false"
      FAULT_SLOW_QUERY_MS: "0"
      FAULT_ERROR_RATE: "0.0"
    depends_on:
      postgres:
        condition: service_healthy

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  otel-collector:
    image: public.ecr.aws/aws-observability/aws-otel-collector:latest
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yaml:/etc/ecs/otel-config.yaml
    command: ["--config", "/etc/ecs/otel-config.yaml"]

volumes:
  pgdata:
