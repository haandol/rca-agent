[app]
ns = "RcaAgent"
stage = "Dev"

[aws]
region = "ap-northeast-2"

[alarm]
notificationEmail = "dongkyl@amazon.com"

[agent]
imageTag = "latest"

[healthcare]
imageTag = "latest"

[ccHeadless]
imageTag = "latest"

[storage]
evidenceBucket = "rca-agent-dev-evidence"
vectorBucket = "rca-agent-dev-vectors"

[table]
[table.rcaSession]
name = "RcaAgentDevRcaSession"

[tracing]
enabled = true
